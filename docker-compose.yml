name: games
services:
  adtaboo:
    build:
      context: .
      dockerfile: games/adtaboo/Dockerfile
      args:
        GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    env_file: .env
    container_name: adversarial-taboo
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "4040:4040"
    volumes:
      - ./games/adtaboo/data:/data
    environment:
      - NODE_ENV=production
      - PORT=4040
      - LOG_LEVEL=info
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  charades:
