name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Install Playwright browsers
        run: pnpm -r --filter='*-e2e' exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: games/*/e2e/playwright-report/
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build adtaboo image
        run: docker build -f games/adtaboo/Dockerfile -t adtaboo .

      - name: Build charades image
        run: docker build -f games/charades/Dockerfile -t charades .

      - name: Build odes-for-cave-men image
        run: docker build -f games/odes-for-cave-men/Dockerfile -t odes-for-cave-men .

      - name: Build yip-yap image
        run: docker build -f games/yip-yap/Dockerfile -t yip-yap .

      - name: Build two-rooms-and-a-boom image
        run: docker build -f games/two-rooms-and-a-boom/Dockerfile -t two-rooms-and-a-boom .

      - name: Build decrypto image
        run: docker build -f games/decrypto/Dockerfile -t decrypto .

      - name: Build landing image
        run: docker build -f apps/landing/Dockerfile -t landing .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, docker, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"repo": "games", "ref": "${{ github.sha }}"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy webhook returned HTTP $HTTP_CODE"
            exit 1
          fi
